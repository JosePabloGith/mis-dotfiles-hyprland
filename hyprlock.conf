# =======================================================================================
# MÓDULO: PANTALLA DE BLOQUEO Y SEGURIDAD (hyprlock.conf)
# AUTOR: Pablo
# PLATAFORMA: Hyprland 0.54.3+
# =======================================================================================
# PROPÓSITO:
#   Definir la apariencia y el comportamiento de la interfaz de autenticación del sistema.
#   Está rigurosamente diseñada para mantener el consumo de CPU y batería en un 0%
#   absoluto mientras el equipo se encuentra bloqueado, evitando llamadas al sistema 
#   operativo (polling) innecesarias.
#
# DEPENDENCIAS Y CONTEXTO DENTRO DEL ECOSISTEMA:
#   - Invocación: Disparado por `hypridle.conf` (tiempo de inactividad) o 
#     por atajo de teclado (vía loginctl lock-session).
#   - Motor de Fondos: La ruta de la imagen es inyectada en tiempo real por el script
#     `~/.config/hypr/scripts/random_lock.sh` usando el comando 'sed'.
# =======================================================================================

# ── 1. MOTOR DE RENDERIZADO DEL FONDO ──────────────────────────────────────────────────
background {
    monitor =
    # [!] INYECCIÓN DINÁMICA: 
    # Esta ruta no es estática. El script `random_lock.sh` la reescribe en 
    # milisegundos justo antes de invocar el bloqueo, garantizando variedad visual.
    path = /home/pablo/Imagenes/wallpapers/hyperLand_wallpapers/is_the_end.jpeg
    
    # Color de respaldo si la imagen falla o tarda en cargar
    color = rgba(1a1a2eff)
    
    # Efecto de lente: Un desenfoque ultra-ligero que oscurece el fondo lo suficiente
    # para que las letras blancas del reloj no se pierdan con fondos claros.
    blur_passes = 1 
    blur_size = 3
}

# ── 2. WIDGET: FECHA (OPTIMIZACIÓN DE CICLOS) ──────────────────────────────────────────
label {
    monitor =
    # [!] OPTIMIZACIÓN DE POLLING (SysAdmin Level):
    # En lugar de ejecutar un subproceso de bash `date` cada segundo (lo cual 
    # despertaría a la CPU de su estado de bajo consumo), usamos:
    # cmd[update:43200000] -> 43,200,000 milisegundos = 12 horas.
    # El sistema solo le preguntará la fecha al kernel 2 veces al día.
    text = cmd[update:43200000] echo "$(date '+%A, %d de %B')"
    color = rgba(ffffffff)
    font_size = 22
    position = 0, 160
    halign = center
    valign = center
}

# ── 3. WIDGET: HORA (RENDERIZADO NATIVO) ───────────────────────────────────────────────
label {
    monitor =
    # [!] C++ NATIVO:
    # El uso de la variable interna `$TIME` le indica al compositor que use su propio
    # reloj interno. Evita por completo invocar a Bash o utilidades GNU externas.
    text = $TIME
    color = rgba(ffffffff)
    font_size = 72
    font_family = monospace
    position = 0, 80
    halign = center
    valign = center
}

# ── 4. WIDGET: IDENTIFICADOR DE USUARIO ────────────────────────────────────────────────
label {
    monitor =
    # Muestra el nombre del usuario logueado usando la variable de entorno nativa.
    text = 󰀄  $USER
    color = rgba(00ff99ff)
    font_size = 18
    position = 0, -30
    halign = center
    valign = center
}

# ── 5. CAMPO DE AUTENTICACIÓN (INPUT FIELD) ────────────────────────────────────────────
input-field {
    monitor =
    size = 400, 55
    outline_thickness = 3
    
    # Estética sincronizada con la paleta de `appearance.conf` (Verde Neón y Gris Oscuro)
    outer_color = rgba(00ff99ee)
    inner_color = rgba(1a1a1aee)
    font_color = rgba(ffffffff)
    
    # Feedback de Interfaz (UX)
    placeholder_text = <i>Contraseña...</i>
    
    # Prevención de Bloqueos (Ceguera de Contraseña):
    # Provee feedback visual inmediato sin necesidad de ver los caracteres escritos.
    fail_text = <b>Contraseña incorrecta</b>
    fail_color = rgba(ff5555ff)      # Rojo brillante = Alerta de fallo
    capslock_color = rgba(ffaa00ff)  # Naranja/Ámbar = Alerta de Bloq Mayús activo
    
    position = 0, -100
    halign = center
    valign = center
}
