# =======================================================================================
# MÓDULO: ATAJOS DE TECLADO Y RATÓN (keybinds.conf)
# AUTOR: Pablo
# PLATAFORMA: Hyprland 0.54.3+
# =======================================================================================
# PROPÓSITO:
#   Mapear de forma estructurada todas las interacciones físicas del usuario hacia
#   acciones del compositor (manejo de ventanas) o ejecución de software (apps/scripts).
#
# DEPENDENCIAS Y SCRIPTS EXTERNOS REQUERIDOS:
#   - Terminal: kitty
#   - Lanzador: rofi-wayland (No el rofi de X11)
#   - Audio: wireplumber / pipewire (comando 'wpctl')
#   - Brillo: brightnessctl
#   - Notificaciones: libnotify ('notify-send')
#   - Scripts Propios: 
#       * ~/.config/hypr/scripts/wallpaper_picker_gui.py (Selector Python/GTK)
#       * ~/bin/monitor_selector.sh (Gestión de displays)
#       * ~/.config/hypr/screenshot-named.sh (Capturas de pantalla)
#
# ARQUITECTURA DE BANDERAS (FLAGS) NATIVAS DE HYPRLAND:
#   - bind  : Ejecución estándar (se lanza al soltar o presionar la tecla).
#   - bindm : Mapeo exclusivo para el Ratón (Mouse).
#   - bindl : 'Locked' -> Funciona INCLUSO si la pantalla está bloqueada por hyprlock.
#   - binde : 'Repeat' -> Se repite continuamente mientras mantengas la tecla presionada.
# =======================================================================================

# ── 1. VARIABLES GLOBALES (MODIFICADORES Y APPS BASE) ──────────────────────────────────
# Utilizar variables permite cambiar el emulador de terminal o el lanzador en todo el 
# sistema modificando una sola línea, respetando el principio DRY (Don't Repeat Yourself).
$mainMod = SUPER
$terminal = kitty
$launcher = rofi -show drun -show-icons

# --[!] optimizacion de lanzamieto de brave para hyprland
# usamos una variable para abrir brave de manera personalizada y compatible con hyprland
$browserBraveConfig = flatpak run com.brave.Browser --ozone-platform=wayland --enable-features=UseOzonePlatform,VaapiVideoDecodeLinuxGL,VaapiVideoEncoder,CanvasOopRasterization --disable-features=WaylandWpColorManagerV1 --ignore-gpu-blocklist --enable-gpu-rasterization --enable-zero-copy

# [!] OPTIMIZACIÓN WAYLAND PARA ELECTRON/CHROMIUM:
# Al lanzar Cursor (basado en VSCode/Electron) en un monitor de 144Hz, por defecto
# usaría XWayland, viéndose borroso y con lag. Estas banderas obligan a Electron a
# renderizarse usando el motor nativo de Wayland (Ozone).
$cursor = cursor --ozone-platform-hint=auto --enable-features=WaylandWindowDecorations


# ── 2. APLICACIONES Y ENTORNO ──────────────────────────────────────────────────────────
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, D, exec, $launcher
bind = $mainMod, C, exec, $cursor
# -> buscador brave modo compatible MOD + B
bind = $mainMod, B, exec, $browserBraveConfig

# --- SCRIPTS PERSONALIZADOS ---
# Llama a nuestro selector nativo con caché optimizado. Usa ruta absoluta para 
# prevenir fallos de resolución de entorno ($PATH) al ser llamado desde el compositor.
bind = $mainMod, W, exec, /home/pablo/.config/hypr/scripts/wallpaper_picker_gui.py

# Selector Interactivo de Monitores
bind = $mainMod, P, exec, ~/bin/monitor_selector.sh 

# Salida segura del entorno Wayland (mata la sesión gráfica y vuelve al TTY/Display Manager)
bind = $mainMod, M, exit,


# ── 3. GESTIÓN DE VENTANAS Y LAYOUTS (ESTILO i3/BSPWM) ─────────────────────────────────
bind = $mainMod SHIFT, Q, killactive      # Cierra la ventana activa de forma segura.
bind = $mainMod, V, togglefloating        # Saca una ventana del mosaico y permite moverla libremente.
bind = $mainMod, F, fullscreen, 1         # Maximiza manteniendo la barra superior (monocle falso).

# --- SISTEMA DE GRUPOS (TABS/STACKING) ---
# Emula el comportamiento de "pestañas" (tabbed) típico de i3wm.
# Ideal para agrupar múltiples terminales o navegadores en un solo espacio del monitor.
bind = $mainMod, S, togglegroup           # Convierte la ventana en un grupo o la saca de él.
bind = $mainMod, Tab, changegroupactive, f # Navega hacia adelante ('f'orward) entre las pestañas del grupo.

# --- NAVEGACIÓN DIRECCIONAL DEL FOCO ---
# Soporte dual: Permite usar las flechas del teclado o las teclas clásicas de VIM (hjkl).
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# --- INTERACCIÓN CON RATÓN (wlroots) ---
# Usando 'bindm' se activa la API de arrastre espacial de Wayland.
bindm = $mainMod, mouse:272, movewindow   # Clic Izquierdo + SUPER: Arrastra la ventana.
bindm = $mainMod, mouse:273, resizewindow # Clic Derecho + SUPER: Redimensiona la ventana fluidamente.


# ── 4. ESPACIOS DE TRABAJO (WORKSPACES) ────────────────────────────────────────────────
# Navegación rápida entre escritorios virtuales (1-5).
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

# Envía la ventana actualmente enfocada al workspace deseado de forma silenciosa.
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5


# ── 5. TECLAS MULTIMEDIA Y HARDWARE (USO DE BANDERAS 'e' Y 'l') ────────────────────────
# [!] ARQUITECTURA EXPERTA: 
# - La 'e' (bindel) permite mantener pulsada la tecla para subir/bajar fluidamente.
# - La 'l' (bindl) permite usar estas teclas INCLUSO cuando la pantalla está bloqueada (hyprlock).
#
# Control de Audio nativo moderno usando Wireplumber (Pipewire)
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Control de Hardware (Backlight / Pantalla de Lenovo)
bindel = , XF86MonBrightnessUp, exec, brightnessctl s 1%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl s 1%-

# Control de apagado usando el boton de encendido|apagado de la computadora
bind = , XF86PowerOff, exec, wlogout


# ── 6. FLUJO DE CAPTURAS DE PANTALLA (SCREENSHOTS) ─────────────────────────────────────
# Delegado al script 'screenshot-named.sh'. Mapea modificadores de teclado a argumentos
# específicos del script para modularizar el código.
bind = , Print, exec, ~/.config/hypr/screenshot-named.sh --area       # Recorte rápido.
bind = ALT, Print, exec, ~/.config/hypr/screenshot-named.sh --full    # Toda la pantalla.
bind = SHIFT, Print, exec, ~/.config/hypr/screenshot-named.sh --name  # Pide nombre (vía Zenity/Rofi).
bind = CTRL, Print, exec, ~/.config/hypr/screenshot-named.sh --monitor# Pantalla actual.


# ── 7. BOTÓN DE PÁNICO (FAIL-SAFE DEL SISTEMA) ─────────────────────────────────────────
# [!] PATRÓN DE SEGURIDAD WAYLAND:
# Herramientas como slurp (selección de área) o hyprpicker (color) "congelan" el frame
# del compositor para tomar datos. Si un proceso muere mientras retiene ese "lock", la
# pantalla quedará congelada. Este atajo lanza una shell independiente que aniquila
# forzosamente (SIGKILL -9) a los culpables habituales, restaurando el control instantáneamente.
bind = $mainMod SHIFT, Escape, exec, sh -lc 'pkill -x -9 hyprpicker; pkill -x -9 slurp; pkill -x -9 grim; notify-send "PÁNICO" "Captura abortada. Sistema gráfico restaurado." -u critical'
