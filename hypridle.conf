# =======================================================================================
# MÓDULO: GESTOR DE INACTIVIDAD Y ENERGÍA (hypridle.conf)
# AUTOR: Pablo
# PLATAFORMA: Hyprland 0.54.3+
# =======================================================================================
# PROPÓSITO:
#   Orquestar el comportamiento del sistema cuando el usuario se aleja del equipo.
#   Aplica una "Degradación Progresiva" en 3 etapas: Bloqueo -> Ahorro -> Suspensión profunda.
#
# DEPENDENCIAS Y CONTEXTO DENTRO DEL ECOSISTEMA:
#   - Motor de Bloqueo: Depende de tu script personalizado `~/.config/hypr/scripts/random_lock.sh`.
#   - Sistema Base: Depende de `systemd` / `loginctl` para gestionar las sesiones y el hardware.
#   - Protocolos: Utiliza los protocolos de inactividad nativos de Wayland (idle-notify).
#
# ARQUITECTURA Y PREVENCIÓN DE FALLOS:
#   1. PROTECCIÓN DE PRIVACIDAD (El Gap de 20s): El bloqueo de sesión se dispara a los
#      880s, y la pantalla se apaga a los 900s. Este margen asegura que Hyprlock ya esté 
#      completamente renderizado antes de cortar la señal de video. Al mover el ratón, 
#      no habrá un "flash" visible de tu escritorio desprotegido.
#   2. DPMS vs DISABLE: Para apagar monitores se usa `dpms off`. Como vimos en tus 
#      perfiles de monitor, DPMS apaga el hardware (luz/píxeles) pero mantiene el 
#      plano virtual intacto. NUNCA desorganiza tus ventanas ni espacios de trabajo.
# =======================================================================================

general {
    # ── 1. COMANDO DE BLOQUEO (FAIL-SAFE) ──────────────────────────────────────────────
    # [!] PROTECCIÓN CONTRA FUGAS DE MEMORIA:
    # La instrucción `pidof hyprlock ||` verifica si el bloqueador ya existe.
    # Si por un bug de Wayland se envían dos señales de inactividad simultáneas, esto
    # previene que se lancen múltiples instancias de `random_lock.sh`, lo que crashearía
    # la RAM al intentar cargar múltiples fondos de alta resolución a la vez.
    lock_cmd = pidof hyprlock || ~/.config/hypr/scripts/random_lock.sh

    # ── 2. GANCHOS DE SUSPENSIÓN (HOOKS) ───────────────────────────────────────────────
    # Si cierras la tapa de la laptop (independientemente del tiempo), fuerza el bloqueo.
    before_sleep_cmd = loginctl lock-session

    # Al levantar la tapa o presionar una tecla, le indica al kernel que encienda los puertos.
    after_sleep_cmd = hyprctl dispatch dpms on

    # ── 3. CONTROL DE SINCRONISMO ──────────────────────────────────────────────────────
    # inhibit_sleep: Espera X segundos después de enviar el comando de bloqueo ANTES de 
    # suspender la RAM. Evita corrupciones de estado donde el PC se duerme con el 
    # bloqueo a medio dibujar.
    inhibit_sleep = 3

    # ── 4. RESPETO DE INHIBIDORES (MODO CINE/JUEGO) ────────────────────────────────────
    # Si estás viendo YouTube (Firefox/Chrome envían señales D-Bus/Wayland) o jugando 
    # a pantalla completa, el sistema ignora los temporizadores y NO se apaga.
    ignore_dbus_inhibit = false
    ignore_systemd_inhibit = false
    ignore_wayland_inhibit = false
}

# =======================================================================================
# ETAPA 1: BLOQUEO DE SEGURIDAD (14 Minutos y 40 Segundos)
# =======================================================================================
listener {
    timeout = 880
    # Invoca el 'lock_cmd' definido en la sección general de arriba.
    on-timeout = loginctl lock-session
}

# =======================================================================================
# ETAPA 2: AHORRO DE ENERGÍA (APAGADO DE PANTALLAS - 15 Minutos)
# =======================================================================================
listener {
    timeout = 900
    # Corta la señal eléctrica de las pantallas (Laptop + Monitores Externos).
    on-timeout = hyprctl dispatch dpms off

    # Al detectar movimiento de hardware, reactiva las señales de video.
    on-resume = hyprctl dispatch dpms on
}

# =======================================================================================
# ETAPA 3: HIBERNACIÓN / SUSPENSIÓN PROFUNDA (25 Minutos)
# =======================================================================================
listener {
    timeout = 1500
    # Congela el estado de la RAM y apaga la CPU, SSD y ventiladores para ahorrar
    # batería al máximo si dejaste la laptop olvidada sobre un escritorio.
    on-timeout = systemctl suspend
}
