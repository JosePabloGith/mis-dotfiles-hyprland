# =======================================================================================
# MÓDULO: PERFIL DE MONITORES - ESCRITORIO EXTENDIDO (monitors_extended.conf)
# AUTOR: Pablo
# =======================================================================================
# PROPÓSITO:
#   Configurar el espacio de trabajo en modo "Extendido" (Multi-monitor). 
#   Expande el área útil del escritorio sumando la pantalla del portátil (eDP-1) y 
#   el monitor externo (HDMI-A-1) como un único lienzo continuo.
#
# DEPENDENCIAS Y CONTEXTO DENTRO DEL ECOSISTEMA:
#   - Interfaz: Este archivo no se carga por arte de magia. Es invocado dinámicamente 
#     por tu script `~/bin/monitor_selector.sh` cuando eliges la opción "Extendido".
#   - Atajos: Depende de `keybinds.conf` (MOD+P) para lanzar el menú de selección.
#   - Motor: wlroots/aquamarine (Hyprland 0.54.3+).
#
# SINTAXIS NATIVA DE HYPRLAND:
#   monitor = NOMBRE, RESOLUCIÓN@Hz, POSICIÓN(X,Y), ESCALA
#   - POSICIÓN: (0x0) es el origen cartesiano (arriba-izquierda).
#   - ESCALA: 1 = 100% (píxel perfecto sin penalización de CPU/GPU en tu AMD Lucienne).
# =======================================================================================

# ── 1. PANTALLA INTEGRADA (LAPTOP - MONITOR SECUNDARIO) ────────────────────────────────
# Interfaz: eDP-1 (Pantalla del portátil).
# Ajustes: 1080p nativo a 60Hz.
# Posición: (0x0). Se establece como el ancla u origen del escritorio.
monitor = eDP-1, 1920x1080@60, 0x0, 1

# ── 2. MONITOR EXTERNO (MONITOR PRINCIPAL / GAMING) ────────────────────────────────────
# Interfaz: HDMI-A-1 (Salida HDMI del portátil).
# Ajustes: 1080p a 144Hz (Máxima fluidez).
# Posición: (1920x0). Al posicionarlo en X=1920, se coloca EXACTAMENTE a la derecha
# de la laptop. Tu ratón pasará fluidamente del borde derecho de la laptop al 
# borde izquierdo del monitor grande.
monitor = HDMI-A-1, 1920x1080@144, 1920x0, 1

# ── 3. RED DE SEGURIDAD (HOTPLUG) ──────────────────────────────────────────────────────
# Si en modo extendido conectas un tercer monitor de imprevisto, esta regla asegura
# que Hyprland no colapse y lo asigne a la derecha del todo automáticamente.
# monitor = , preferred, auto, 1

# =======================================================================================
# ── VINCULACIÓN DE ESPACIOS DE TRABAJO (WORKSPACES OPTIMIZADOS) ────────────────────────
# En un perfil extendido, la mejor práctica de SysAdmin es asignar espacios fijos
# a cada monitor. Así, si abres una terminal en el espacio 1, no aparecerá 
# accidentalmente en el monitor grande donde querías jugar o ver un video.
#
# Descomenta estas líneas si deseas anclarlos:
# workspace = 1, monitor:eDP-1       # Workspace 1 (Chat/Música) anclado a la Laptop
# workspace = 2, monitor:HDMI-A-1    # Workspace 2 (Juegos/IDE) anclado al Monitor Grande
# workspace = 3, monitor:HDMI-A-1    # Workspace 3 (Navegador) anclado al Monitor Grande
# =======================================================================================
