# =======================================================================================
# MÓDULO: PERFIL DE MONITORES - SOLO LAPTOP / MOVILIDAD (monitors_laptop.conf)
# AUTOR: Pablo
# PLATAFORMA: Hyprland 0.54.3+
# =======================================================================================
# PROPÓSITO:
#   Configurar el equipo para "Modo Movilidad". Desactiva cualquier salida de video
#   externa para conservar al máximo la batería y concentra toda la renderización de 
#   la iGPU AMD Lucienne exclusivamente en la pantalla física del portátil.
#
# DEPENDENCIAS Y CONTEXTO DENTRO DEL ECOSISTEMA:
#   - Invocación: Cargado dinámicamente por el script `~/bin/monitor_selector.sh` 
#     (mapeado a MOD+P en keybinds.conf) cuando desconectas tu monitor de escritorio.
#
# ARQUITECTURA Y PREVENCIÓN DE FALLOS:
#   1. MIGRACIÓN INVERSA: Al igual que en el modo Clamshell, desactivar el HDMI 
#      forzará a wlroots a rescatar todos los espacios de trabajo (workspaces) y 
#      ventanas que estaban en el monitor grande y re-acomodarlos en la laptop.
#   2. PREVENCIÓN DE FUGAS DE VENTANAS: El uso de reglas de desactivación explícitas 
#      previene que las ventanas se queden "atrapadas" en coordenadas que ya no existen
#      físicamente.
# =======================================================================================

# ── 1. PANTALLA INTEGRADA (ÚNICO EJE DE TRABAJO) ───────────────────────────────────────
# Interfaz: eDP-1 (Pantalla del portátil).
# Ajustes: 1080p nativo a 60Hz.
# Posición: (0x0). Toma el control absoluto del plano de coordenadas como único monitor.
# Escala: 1 (Sin escalado fraccionario, ahorrando batería crítica en movilidad).
monitor = eDP-1, 1920x1080@60, 0x0, 1


# ── 2. DESACTIVACIÓN DE PUERTOS EXTERNOS ───────────────────────────────────────────────
# Apaga deliberadamente la salida gráfica del puerto HDMI. Esto le indica al driver 
# AMDGPU que puede cortar la energía a ese bus de hardware.
monitor = HDMI-A-1, disable


# ── 3. RED DE SEGURIDAD (ANTI-MONITORES FANTASMA) ──────────────────────────────────────
# [!] FIX AVANZADO DE WAYLAND:
# Al desconectar adaptadores USB-C/HDMI bruscamente, el kernel Linux (DRM) a veces 
# tarda en limpiar el estado del hardware y reporta a Hyprland un monitor llamado 
# 'Unknown-1'. Esto puede causar que el ratón se salga de la pantalla de la laptop o 
# que las ventanas se pierdan en un vacío invisible.
# Esta regla aniquila ese monitor fantasma de raíz.
monitor = Unknown-1, disable
