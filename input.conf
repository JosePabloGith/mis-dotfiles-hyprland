# =======================================================================================
# MÓDULO: ENTRADA Y DISPOSITIVOS (input.conf)
# AUTOR: Pablo
# PLATAFORMA: Hyprland 0.54.3
# =======================================================================================
# PROPÓSITO:
#   Gestionar la interacción física entre el usuario y el sistema operativo a través de
#   la capa 'libinput' de Wayland. Controla teclados, ratones, touchpads y tabletas
#   digitalizadoras de forma nativa y sin latencia.
#
# DEPENDENCIAS Y CONTEXTO:
#   - Depende del soporte nativo de Wayland/wlroots para 'libinput'. No se necesitan
#     controladores externos (como xf86-input-wacom o synaptics).
#   - COMANDO ÚTIL: Para descubrir el nombre exacto de un nuevo dispositivo (mouse,
#     teclado, tableta) que conectes en el futuro, ejecuta en la terminal: 
#     `hyprctl devices`
#
# CONSIDERACIONES ARQUITECTÓNICAS:
#   - El mapeo de la tableta gráfica al monitor eDP-1 es una corrección crítica de 
#     geometría. Al tener dos monitores (eDP-1 y HDMI), la zona de dibujo por defecto
#     se estiraría sobre ambos, distorsionando los círculos en óvalos. Al anclarla a
#     un solo monitor, se preserva la relación de aspecto 1:1 absoluta.
# =======================================================================================

# ── 1. CONFIGURACIÓN GLOBAL (TECLADO Y RATÓN) ──────────────────────────────────────────
input {
    # --- TECLADO ---
    # Distribución del teclado a nivel de kernel/Wayland.
    kb_layout = latam
    
    # Variante, modelo y opciones (generalmente vacíos a menos que uses distribuciones
    # compuestas o desees remapear teclas especiales como Bloq Mayús a Escape).
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    # --- RATÓN / FOCO ---
    # 1 = El foco de la ventana sigue inmediatamente al puntero del ratón (Sloppy Focus).
    # 0 = Debes hacer clic explícitamente en una ventana para darle el foco.
    follow_mouse = 1
    
    # Aceleración por hardware del ratón. 
    # 0.0 significa sin modificación de aceleración (datos crudos del sensor del mouse).
    # Rango válido: -1.0 a 1.0.
    sensitivity = 0 

    # --- TOUCHPAD (PORTÁTIL) ---
    # Configuraciones ergonómicas exclusivas para el hardware de la Lenovo.
    touchpad {
        # false = Scroll tradicional (el contenido sube cuando deslizas los dedos abajo).
        # true  = Scroll natural tipo macOS/Móviles.
        natural_scroll = false
        
        # Permite tocar suavemente el panel para hacer clic izquierdo.
        tap-to-click = true
        
        # [!] OPTIMIZACIÓN ERGONÓMICA VITAL:
        # Desactiva el touchpad físicamente mientras el teclado está registrando pulsaciones.
        # Evita clics accidentales con la palma de la mano al programar o escribir.
        disable_while_typing = true
    }
}

# ── 2. CONFIGURACIÓN ESPECÍFICA DE HARDWARE (PERIFÉRICOS) ──────────────────────────────
# Permite sobreescribir las reglas globales para un dispositivo específico basado en su
# nombre reportado por el sistema (`hyprctl devices`).

# --- TABLETA GRÁFICA XP-PEN (UGEE) ---
# Fuerza a la tableta digitalizadora a limitar su área de interacción exclusivamente
# a la pantalla de la laptop (1920x1080).
# Si no se hiciera esto en un entorno multi-monitor, dibujar un círculo perfecto en la 
# tableta daría como resultado un óvalo estirado a lo largo de las 2 pantallas.
device {
    name = ugtablet-ugee-s640-pen
    output = eDP-1
}

# ── (EJEMPLO) SI TUVIERAS UN RATÓN GAMING ──────────────────────────────────────────────
# Puedes definir sensibilidades distintas por dispositivo. Por ejemplo:
# device {
#     name = logitech-g502-mouse
#     sensitivity = -0.5
# }
