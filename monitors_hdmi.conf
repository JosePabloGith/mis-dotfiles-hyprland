# =======================================================================================
# MÓDULO: PERFIL DE MONITORES - SOLO HDMI / MODO CLAMSHELL (monitors_hdmi.conf)
# AUTOR: Pablo
# PLATAFORMA: Hyprland 0.54.3+
# =======================================================================================
# PROPÓSITO:
#   Configurar el espacio de trabajo en modo "Escritorio" o "Clamshell".
#   Este perfil apaga la pantalla integrada del portátil y concentra toda la 
#   salida gráfica exclusivamente en el monitor externo de alto rendimiento.
#
# DEPENDENCIAS Y CONTEXTO DENTRO DEL ECOSISTEMA:
#   - Invocación: Este archivo es cargado dinámicamente por el script 
#     `~/bin/monitor_selector.sh` (mapeado a MOD+P en keybinds.conf).
#   - Motor: El backend DRM de wlroots/aquamarine se encarga de gestionar las
#     señales físicas hacia los puertos.
#
# ARQUITECTURA Y PREVENCIÓN DE FALLOS (Orden de Ejecución):
#   1. MIGRACIÓN NATIVA: En Wayland, cuando una pantalla se desactiva, el compositor
#      no destruye las ventanas; automáticamente migra todos los espacios de trabajo 
#      (workspaces) activos a la pantalla que quede viva.
#   2. SECUENCIA CRÍTICA: Es imperativo configurar/encender el monitor HDMI *antes* 
#      de apagar el eDP-1. Si se apagara el eDP-1 primero, el compositor entraría en 
#      un estado "headless" (sin pantallas) por un milisegundo, lo que puede causar 
#      pánicos en aplicaciones GPU o el colapso del propio Hyprland.
# =======================================================================================

# ── 1. ASEGURAR Y ANCLAR EL MONITOR EXTERNO (PRIMER PASO) ──────────────────────────────
# Interfaz: HDMI-A-1 (Salida HDMI del portátil).
# Ajustes: 1080p a 144Hz.
# Posición: (0x0). Al ser ahora el ÚNICO monitor, se convierte matemáticamente en el 
# origen absoluto del plano cartesiano de Wayland.
# Escala: 1 (100% - Renderizado perfecto sin consumo extra de la iGPU AMD).
monitor = HDMI-A-1, 1920x1080@144, 0x0, 1


# ── 2. DESACTIVAR LA PANTALLA INTEGRADA (SEGUNDO PASO) ─────────────────────────────────
# Interfaz: eDP-1 (Pantalla del portátil).
# Acción: 'disable' corta la señal de video por completo.
# Resultado: La pantalla se apaga, ahorrando energía, y Hyprland transfiere todo 
# el contenido gráfico abierto hacia el HDMI-A-1 de forma transparente.
monitor = eDP-1, disable
