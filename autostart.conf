# =======================================================================================
# MÓDULO: INICIO AUTOMÁTICO (autostart.conf)
# AUTOR: Pablo
# =======================================================================================
# PROPÓSITO:
#   Gestionar los demonios (daemons), servicios en segundo plano y aplicaciones
#   que deben iniciar EXCLUSIVAMENTE una vez al momento de hacer login en Hyprland.
#
# DEPENDENCIAS REQUERIDAS:
#   - policykit-1-gnome : Agente de autenticación gráfico (Pide la contraseña sudo en GUI).
#   - waybar            : Barra de estado altamente personalizable para Wayland.
#   - network-manager-applet : Provee 'nm-applet' para gestionar WiFi/Red desde el tray.
#   - hypridle          : Gestor nativo de inactividad (suspensión/bloqueo de pantalla).
#   - hyprpaper         : Motor nativo de fondos de pantalla (0% CPU).
#
# ARQUITECTURA Y OPTIMIZACIÓN (exec-once vs exec):
#   - Se utiliza 'exec-once' para asegurar que el proceso nazca al iniciar la sesión y
#     NO se duplique si recargas la configuración de Hyprland (con SUPER+M o guardando
#     un archivo .conf).
#   - Usar 'exec' simple aquí crearía fugas de memoria (Memory Leaks), abriendo múltiples
#     instancias de Waybar o Applets en cada recarga.
#
# INSTRUCCIONES DE MODIFICACIÓN:
#   - Si deseas que una aplicación de usuario inicie con el sistema (ej. Discord, Spotify,
#     Nextcloud), agrégala al final de este archivo usando 'exec-once = nombre_app &'.
# =======================================================================================

# ── 1. SERVICIOS DEL SISTEMA Y SEGURIDAD ───────────────────────────────────────────────
# Polkit: Crítico en Wayland. Sin este agente, las aplicaciones gráficas que requieran
# permisos de administrador (como GParted o gestores de paquetes) fallarán silenciosamente.
exec-once = /usr/lib/policykit-1-gnome/polkit-gnome-authentication-agent-1

# Demonios de Red: Se alojan en la bandeja del sistema (system tray) de Waybar.
exec-once = nm-applet --indicator


# ── 2. ENTORNO DE ESCRITORIO Y BARRA ───────────────────────────────────────────────────
# Waybar: Dibuja la barra de estado superior/inferior.
exec-once = waybar

# Hypridle: Se queda dormido escuchando eventos del kernel. Si pasas 'X' minutos sin
# mover el mouse, delegará la acción a tu script 'random_lock.sh' o a 'systemctl suspend'.
exec-once = hypridle


# ── 3. MOTOR DE FONDOS DE PANTALLA (RENDIMIENTO EXTREMO) ───────────────────────────────
# Hyprpaper: Lee el archivo ~/.config/hypr/hyprpaper.conf de forma instantánea.
# Reemplaza a swww/waypaper en el arranque para garantizar que el procesador 
# no desperdicie ciclos inicializando animaciones que el usuario no está viendo.
exec-once = hyprpaper


# --- 4.- GUARDIAN RESTABLECEDOR DE FONDO DE PANTALLA AL REINICIAR usando restore_wallpaper.sh
exec-once = bash -c 'sleep 5 && ~/.config/hypr/scripts/restore_wallpaper.sh'

