# =======================================================================================
# MÓDULO: REGLAS DE VENTANAS Y COMPORTAMIENTO (rules.conf)
# AUTOR: Pablo
# PLATAFORMA: Hyprland 0.54.3+ (Sintaxis de Bloque Moderna)
# =======================================================================================
# PROPÓSITO:
#   Este módulo actúa como el "Control de Tráfico" del compositor. Por defecto, Hyprland
#   fuerza a todas las ventanas a organizarse en mosaico (tiling) usando el layout 
#   'dwindle'. Este archivo define excepciones estrictas (flotar, anclar, redimensionar) 
#   para aplicaciones específicas que se rompen o pierden usabilidad si son forzadas 
#   a compartir espacio en el mosaico.
#
# DEPENDENCIAS Y CONTEXTO:
#   - Flameshot: Herramienta de captura de pantalla. Requiere ejecutarse sobre todo 
#     el escritorio sin ser redimensionada por Hyprland.
#   - Script 'wallpaper_picker_gui.py': Nuestro selector de fondos nativo en Python/GTK.
#   - IDE Cursor / GTK: Los selectores de archivos del sistema operativo.
#
# CONSIDERACIONES ARQUITECTÓNICAS (Hyprland 0.54+):
#   - Sintaxis Estructurada: Se utiliza el nuevo bloque `windowrule { }` introducido en 
#     versiones recientes, abandonando el viejo y desordenado `windowrulev2 = ...`.
#   - Rendimiento: Las reglas 'no_anim = 1' en herramientas críticas (como Flameshot y 
#     nuestro picker) garantizan que la interfaz aparezca al instante en el frame 0, 
#     evitando parpadeos o capturas de pantalla borrosas debido a transiciones.
# =======================================================================================

# ── 1. FLAMESHOT (CAPTURA DE PANTALLA) ─────────────────────────────────────────────────
# Flameshot es notoriamente problemático en Wayland/wlroots. Esta regla es un "Fix" 
# obligatorio de la comunidad para evitar que la ventana de captura se asigne a una 
# cuadrícula o se distorsione.
windowrule {
    name = flameshot_floating
    match:class = flameshot
    float = 1                       # Lo saca del mosaico y lo superpone a todo.
    pin = 1                         # Lo ancla a la pantalla, haciéndolo visible en todos los workspaces.
    no_anim = 1                     # Elimina la animación para captura instantánea (0 ms lag).
    move = 0 0                      # Fuerza su aparición en la esquina superior izquierda exacta.
    suppress_event = fullscreen     # Previene bugs de escalado al intentar forzar pantalla completa.
}

# ── 2. PROYECTOS UAM (GLUT / OPENGL) ───────────────────────────────────────────────────
# Regla académica. Las ventanas creadas por C/C++ usando FreeGLUT o librerías gráficas 
# universitarias suelen estar hardcodeadas a una resolución fija (ej. 800x600). 
# Si Hyprland las estira, rompe la relación de aspecto del proyecto.
windowrule {
    name = uam_projects
    match:title = ^(UAM_.*)         # Expresión regular: Aplica a cualquier binario que inicie con "UAM_"
    float = 1                       # Respeta la resolución nativa programada en el código.
    center = 1                      # Aparece elegante y centrado en la pantalla para presentar la tarea.
}

# ── 3. WALLPAPER PICKER (SCRIPT NATIVO EN PYTHON) ──────────────────────────────────────
# Esta regla controla nuestro script ~/.config/hypr/scripts/wallpaper_picker_gui.py
# Al inyectar el título "wallpaper_picker" desde la clase Gtk.Window en el script, 
# Hyprland intercepta la ventana y la convierte en una barra inferior (Dock) perfecta.
windowrule {
    name = wallpaper_picker
    match:title = ^(wallpaper_picker)$
    float = 1                       # Lo extrae del sistema de mosaico (vital para un dock).
    pin = 1                         # Lo mantiene fijo independientemente del workspace activo.
    no_anim = 1                     # Pop-up instantáneo al presionar MOD+W.
    size = 1880 220                 # Ancho casi completo (1920-40) y altura de 220px.
    move = 20 830                   # Margen de 20px a los lados y pegado al borde inferior.
    rounding = 16                   # Sincroniza las esquinas redondeadas con el CSS del script de Python.
}

# ── 4. DIÁLOGOS DEL SISTEMA Y CURSOR (IDE) ─────────────────────────────────────────────
# Mejora masiva de Experiencia de Usuario (UX). Por defecto, Hyprland aplastaría 
# las ventanas de "Guardar Archivo" como si fueran un programa más.
windowrule {
    name = cursor_dialogs
    match:title = ^(Abrir archivo|Guardar como|Open File|Save As)$
    float = 1                       # Permite que la ventana de guardado se vea normal.
    center = 1                      # Aparece en el centro del IDE (Cursor/VSCode/Nvim) listo para interactuar.
}



# ── 5. CENTRO DE MANDO PENTIUM (mando.py / GTK) ───────────────────────────────────────
# Ventana principal del menú GTK.
# En /home/pablo/bin/aux/visCriptOptimizacion/mando.py se usa:
#   title = "centro_mando"

windowrule {
    name = centro_mando_floating
    match:title = ^(centro_mando)$
    float = 1
    center = 1
    no_anim = 1
    size = 460 360
    rounding = 16
    opacity = 0.96 override
}

# ── 6. TERMINAL DE ACTUALIZACIÓN (kitty --class floating_update) ─────────────────────
windowrule {
    name = floating_update
    match:class = ^(floating_update)$
    float = 1
    center = 1
    size = 70% 70%
    no_anim = 1
}

# ── 7. TERMINAL DE LIMPIEZA (kitty --class floating_clean) ────────────────────────────
windowrule {
    name = floating_clean
    match:class = ^(floating_clean)$
    float = 1
    center = 1
    size = 60% 60%
    no_anim = 1
}

# ── 8. TERMINAL DE INFORMACIÓN / ZOMBIES (kitty --class floating_info) ───────────────
windowrule {
    name = floating_info
    match:class = ^(floating_info)$
    float = 1
    center = 1
    size = 50% 60%
    no_anim = 1
}
