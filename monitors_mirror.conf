# =======================================================================================
# MÓDULO: PERFIL DE MONITORES - MODO ESPEJO / CLON (monitors_mirror.conf)
# AUTOR: Pablo
# PLATAFORMA: Hyprland 0.54.3+
# =======================================================================================
# PROPÓSITO:
#   Configurar el espacio de trabajo en "Modo Espejo" (Duplicado). 
#   Proyecta exactamente el mismo buffer de video de la pantalla del portátil 
#   hacia el monitor externo. Ideal para presentaciones, compartir pantalla o dar clases.
#
# DEPENDENCIAS Y CONTEXTO DENTRO DEL ECOSISTEMA:
#   - Invocación: Cargado dinámicamente por tu script `~/bin/monitor_selector.sh` 
#     (MOD+P) cuando necesitas proyectar tu pantalla.
#   - Motor: Backend DRM de Hyprland.
#
# ARQUITECTURA Y PREVENCIÓN DE FALLOS (Wayland Asynchronous Rendering):
#   1. CERO PANTALLAS FANTASMA: Al usar el parámetro nativo 'mirror', Hyprland 
#      entiende que no debe crear nuevos espacios de trabajo (workspaces) para el 
#      monitor HDMI. Simplemente clona la salida 1.
#   2. INDEPENDENCIA DE HZ: A diferencia del viejo X11, Wayland permite que el monitor 
#      clon mantenga sus 144Hz nativos a nivel de hardware, lo que garantiza que 
#      tu cursor se siga moviendo con fluidez extrema en la pantalla proyectada, 
#      incluso si la fuente (laptop) corre a 60Hz.
# =======================================================================================

# ── 1. PANTALLA FUENTE (ORIGEN DE LA CLONACIÓN) ────────────────────────────────────────
# Interfaz: eDP-1 (Pantalla del portátil).
# Ajustes: 1080p nativo a 60Hz.
# Posición: (0x0). Se establece como la pantalla maestra de donde se extraerá la imagen.
monitor = eDP-1, 1920x1080@60, 0x0, 1


# ── 2. PANTALLA DESTINO (MONITOR CLONADO A ALTA FRECUENCIA) ────────────────────────────
# Interfaz: HDMI-A-1 (Salida HDMI del portátil).
# Ajustes: 1080p a 144Hz (Mantiene la tasa de refresco premium del hardware).
# Posición: 'auto'. Al usar 'mirror', las coordenadas X,Y pasan a ser irrelevantes.
# Atributo Especial: 'mirror,eDP-1'. Le dice al compositor que calque la salida maestra.
monitor = HDMI-A-1, 1920x1080@144, auto, 1, mirror, eDP-1


# ── 3. RED DE SEGURIDAD (FAILSAFE PARA PROYECTORES DESCONOCIDOS) ───────────────────────
# Esta regla comentada es un salvavidas para entornos académicos o laborales.
# Si conectas tu laptop a un proyector aleatorio de la UAM (que no se llama HDMI-A-1),
# Hyprland usará esta regla general (indicada por la coma inicial sin nombre de monitor) 
# para clonar tu pantalla automáticamente a la resolución preferida del proyector.
#
# Para activarlo en emergencias, descomenta la siguiente línea:
# monitor = , preferred, auto, 1, mirror, eDP-1
