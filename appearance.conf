# =======================================================================================
# MÓDULO: APARIENCIA, RENDERIZADO Y ESTÉTICA (appearance.conf)
# AUTOR: Pablo
# Plataforma: Hyperland 0.54.3
# =======================================================================================
# PROPÓSITO:
#   Controlar el motor gráfico OpenGL de Hyprland. Define cómo se dibujan las ventanas,
#   los bordes, las sombras y las animaciones. Está estrictamente balanceado para
#   ofrecer una estética "Premium" sin sacrificar el rendimiento térmico ni la batería.
#
# DEPENDENCIAS Y CONTEXTO:
#   - Motor: Depende del backend 'Aquamarine' (introducido en Hyprland 0.42+ y 
#     estabilizado en 0.54+).
#   - Interacción: Las opciones del bloque 'group' dependen de los atajos de 
#     teclado (MOD+S y MOD+Tab) definidos en tu 'keybinds.conf'.
#
# CONSIDERACIONES DE OPTIMIZACIÓN (AMD Lucienne iGPU):
#   1. Blur Apagado: El efecto 'blur' (desenfoque en tiempo real) es el consumidor #1
#      de recursos de GPU en Wayland. Al mantenerlo 'false', la iGPU AMD queda libre
#      garantizando 144fps estables en tu monitor externo sin calentamiento.
#   2. VFR (Variable Frame Rate): Activado en la sección 'misc'. Es la optimización 
#      más crítica del sistema.
# =======================================================================================

# ── 1. CONFIGURACIÓN GENERAL (GEOMETRÍA Y BORDES) ──────────────────────────────────────
general {
    gaps_in = 5          # Espacio (píxeles) ENTRE ventanas.
    gaps_out = 10        # Espacio (píxeles) entre las ventanas y los BORDES del monitor.
    border_size = 2      # Grosor del borde de las ventanas.
    
    # Colores base para los bordes (Tema visual: Verde Neón y Transparente)
    # Nota: Si deseas un gradiente animado en el futuro, usa la sintaxis comentada.
    # col.active_border = rgba(00ff99ee) rgba(33ccffee) 45deg
    col.active_border = rgba(00ff99ee)
    col.inactive_border = rgba(59595900) # Totalmente transparente para ventanas sin foco
    
    # Motor de disposición espacial. 'dwindle' divide la pantalla en espiral/fibonacci,
    # ideal para pantallas panorámicas y portátiles.
    layout = dwindle
}

# ── 2. DECORACIONES (SOMBRAS Y RENDERIZADO) ────────────────────────────────────────────
decoration {
    rounding = 10        # Suaviza las esquinas de las ventanas (radio en píxeles).
    
    # Renderizado de desenfoque (Optimización: APAGADO para máximo rendimiento)
    blur {
        enabled = false
        # size = 4
        # passes = 1
    }
    
    # NUEVA SINTAXIS DE SOMBRAS (Hyprland v0.54+)
    # En versiones antiguas esto colgaba directamente de 'decoration'. Ahora tiene
    # su propio bloque aislado para mejor manejo de memoria en wlroots.
    shadow {
        enabled = true
        range = 4                 # Extensión de la sombra. Rango corto = menos carga GPU.
        render_power = 3          # Caída de la sombra (falloff). 3 da un difuminado natural.
        color = rgba(1a1a1aee)    # Sombra oscura casi opaca para dar profundidad 3D.
    }
}

# ── 3. ANIMACIONES (FLUIDEZ) ───────────────────────────────────────────────────────────
# Las animaciones usan matemáticas de interpolación (Curvas de Bézier).
# Esta curva en particular empieza rápido y desacelera suavemente al final, 
# dando una sensación de "peso" e inercia a las ventanas.
animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80% # Al cerrar, se encojen al 80% antes de desaparecer.
    animation = workspaces, 1, 6, default
}

# ── 4. GRUPOS (TABS/STACKING) ──────────────────────────────────────────────────────────
# Permite apilar ventanas una detrás de otra (estilo pestañas de navegador).
# Mapeado a SUPER+S en tu keybinds.conf. Excelente para pantallas de laptop (eDP-1)
# donde el espacio horizontal es limitado.
group {
    col.border_active = rgba(00ff99ee)
    col.border_inactive = rgba(595959aa)
    
    groupbar {
        font_size = 10
        height = 15
        col.active = rgba(00ff99ee)
        col.inactive = rgba(595959aa)
        text_color = rgba(ffffffff)
        render_titles = true
    }
}

# ── 5. OPTIMIZACIONES DEL SISTEMA (MISC) ───────────────────────────────────────────────
misc {
    disable_hyprland_logo = false     # Muestra el logo de Hyprland en fondos vacíos.
    disable_splash_rendering = false  # Muestra mensajes graciosos al iniciar.

    # [!] VFR (Variable Frame Rate) - OPTIMIZACIÓN CRÍTICA:
    # Si la pantalla no está cambiando (ej. estás leyendo un PDF o escribiendo código),
    # VFR le dice a Hyprland que baje el ciclo de renderizado a casi 0 Hz.
    # Resultado: Tu procesador AMD entra en estado de reposo, ahorrando horas de 
    # batería y manteniendo los ventiladores apagados.
    vfr = true 
}

# ── 6. COMPATIBILIDAD XWAYLAND (LEGACY APPS) ───────────────────────────────────────────
xwayland {
    # Evita que las aplicaciones antiguas diseñadas para X11 (que aún no soportan Wayland)
    # se vean borrosas cuando las mueves entre monitores con diferentes escalas.
    force_zero_scaling = true
}
