# =======================================================================================
# ARCHIVO MAESTRO: hyprland.conf
# AUTOR: Pablo
# VERSIÓN DE HYPRLAND: 0.54.3+
# =======================================================================================
# PROPÓSITO:
#   Este es el punto de entrada (entrypoint) del compositor Hyprland. En lugar de tener
#   un archivo monolítico de 1000 líneas, se utiliza una arquitectura MODULAR. Esto 
#   sigue la filosofía UNIX: "divide y vencerás". Facilita el control de versiones en Git, 
#   permite hacer pruebas aisladas (debug) y previene errores en cascada.
#
# HARDWARE OBJETIVO:
#   - Procesador: AMD Ryzen 7 5700U (iGPU Lucienne).
#   - Al ser hardware AMD nativo, NO se requieren parches inestables de Nvidia 
#     (ej. LIBVA_DRIVER_NAME o env = WLR_NO_HARDWARE_CURSORS=1), lo que permite 
#     un renderizado 100% puro en wlroots/aquamarine.
# =======================================================================================

# ── 1. CARGA DE MÓDULOS (SOURCING) ─────────────────────────────────────────────────────
# La directiva 'source' inyecta el contenido de otros archivos directamente aquí.
# Si un archivo falla, Hyprland mostrará un error rojo apuntando al módulo exacto.

# [!] ARQUITECTURA DE MONITORES (DINÁMICA):
# No cargamos un archivo estático. 'monitors.conf' es un ENLACE SIMBÓLICO (Symlink) 
# gestionado por el script selector (MOD+P). Dependiendo del perfil elegido 
# (Laptop, HDMI o Extendido), este enlace apuntará al archivo real correspondiente.
# Esto permite cambiar la disposición física sin reiniciar Hyprland.
source = ~/.config/hypr/monitors.conf

# Demonios de fondo, PolicyKit y servicios que deben iniciar con la sesión (exec-once)
source = ~/.config/hypr/autostart.conf

# Motor de renderizado: Bordes, sombras (nueva sintaxis v0.54), animaciones y VFR
source = ~/.config/hypr/appearance.conf

# Dispositivos de hardware: Sensibilidad del ratón, Teclado y Tableta gráfica XP-PEN
source = ~/.config/hypr/input.conf

# Reglas de comportamiento de ventanas (Floating, Pinning, opacidad por aplicación)
source = ~/.config/hypr/rules.conf

# Asignación de atajos de teclado (Keybinds) y configuración del ratón
source = ~/.config/hypr/keybinds.conf


# ── 2. VARIABLES DE ENTORNO NATIVAS (ENV) ──────────────────────────────────────────────
# La directiva 'env' exporta variables al entorno de sesión ANTES de que las 
# aplicaciones gráficas se ejecuten. Esto es crítico para forzar el uso de Wayland.

# --- GESTIÓN DEL CURSOR ---
# Wayland a veces sufre de cursores que cambian de tamaño al pasar entre ventanas 
# GTK y Qt. Esto fuerza un tamaño uniforme a nivel de compositor y temas.
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# --- INTEGRACIÓN XDG (X-Desktop-Group) ---
# FUNDAMENTAL: Estas variables le dicen a aplicaciones de terceros (como OBS Studio, 
# navegadores o Discord) que estás en Hyprland. Sin esto, características como 
# COMPARTIR PANTALLA (Screen Sharing) o los portales de archivos fallarán.
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# --- FORZAR BACKENDS NATIVOS (ADIÓS XWAYLAND) ---
# XWayland es una capa de compatibilidad que consume CPU extra y puede generar "tearing".
# Estas variables obligan a las librerías gráficas a intentar renderizar en Wayland 
# puro primero. Si fallan, caen (fallback) a X11 (*).
env = GDK_BACKEND,wayland,x11,* # Para aplicaciones GTK (GNOME)
env = QT_QPA_PLATFORM,wayland;xcb     # Para aplicaciones Qt (KDE/VLC)
env = SDL_VIDEODRIVER,wayland         # Para juegos y emuladores que usan SDL2
env = CLUTTER_BACKEND,wayland         # Para interfaces basadas en Clutter
